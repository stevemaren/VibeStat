# .github/workflows/release.yml
# Builds VibeStat installers on macOS, Windows, and Linux in the cloud and
# attaches them to a DRAFT GitHub Release. Official Tauri v2 pipeline.
#
# Two ways to trigger it:
#   1. Actions tab -> "Build installers" -> "Run workflow"  (manual button), or
#   2. push a version tag:  git tag v1.0.0 && git push origin v1.0.0
#
# Prerequisites (one-time):
#   - Repo Settings -> Actions -> General -> Workflow permissions ->
#     "Read and write permissions"  (so the run can create the release).
#   - In src-tauri/tauri.conf.json set  "bundle": { "targets": "all" }  so each
#     OS emits its own installer (.dmg / .msi+.exe / .deb+.AppImage).

name: 'Build installers'

on:
  workflow_dispatch: {}        # manual "Run workflow" button
  push:
    tags:
      - 'v*'                   # ...or push a tag like v1.0.0

jobs:
  publish-tauri:
    permissions:
      contents: write          # allow the run to create the release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'      # Apple Silicon (M-series) .dmg
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'      # Intel Mac .dmg
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'      # Linux .deb / .AppImage
            args: ''
          - platform: 'windows-latest'    # Windows .msi / .exe
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Both mac targets are only needed on the macOS runners.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build (faster reruns)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install
        # If your Tauri project lives in a SUBFOLDER of the repo, add:
        #   working-directory: ./vibestat
        # and set projectPath below to match.

      - name: Build app and create the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ad-hoc sign so unsigned Apple Silicon builds aren't flagged "damaged".
          # Replace with a real Developer ID + notarization later (see SETUP.md).
          APPLE_SIGNING_IDENTITY: '-'
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'vibestat-v__VERSION__' }}
          releaseName: ${{ github.ref_type == 'tag' && github.ref_name || 'VibeStat v__VERSION__' }}
          releaseBody: 'Download the installer for your platform from the assets below.'
          releaseDraft: true     # you review and click Publish
          prerelease: false
          args: ${{ matrix.args }}
          # If the Tauri project is NOT at the repo root, uncomment and adjust:
          # projectPath: ./vibestat
